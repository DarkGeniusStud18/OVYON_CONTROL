<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OVYON Control - Voice Assistant</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
        .pulsing-glow {
            box-shadow: 0 0 0 0 rgba(255, 105, 51, 0.7);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 105, 51, 0.7);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(255, 105, 51, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 105, 51, 0);
            }
        }
    </style>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ff6933",
              "background-light": "#f8f6f5",
              "background-dark": "#121212",
              "status-connected": "#28A745",
              "status-disconnected": "#DC3545"
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="flex size-12 shrink-0 items-center text-gray-300">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-gray-100 dark:text-gray-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">AION Voice Control</h2>
<div class="flex w-auto items-center justify-end">
<div class="flex items-center gap-2">
<div class="h-2 w-2 rounded-full bg-status-connected"></div>
<p class="text-status-connected text-sm font-bold leading-normal tracking-[0.015em] shrink-0">Connected</p>
</div>
</div>
</div>
<div class="flex flex-col flex-grow p-4 justify-between">
<!-- Real-time Transcription Area -->
<div class="flex-grow flex items-center justify-center">
<p class="text-gray-200 dark:text-gray-200 text-base font-normal leading-normal text-center h-16">Listening...</p>
</div>
<!-- Central Microphone Icon & Prompt -->
<div class="flex flex-col items-center justify-center my-8">
<div class="relative mb-6">
<button aria-label="Activate voice control" class="w-32 h-32 rounded-full bg-primary flex items-center justify-center pulsing-glow">
<span class="material-symbols-outlined text-white text-6xl">mic</span>
</button>
</div>
<h3 class="text-gray-100 dark:text-gray-100 tracking-light text-2xl font-bold leading-tight text-center">Parlez à AION</h3>
</div>
<!-- Recent Commands -->
<div class="flex-grow">
<h3 class="text-gray-100 dark:text-gray-100 text-lg font-bold leading-tight tracking-[-0.015em] pb-4">Recent Commands</h3>
<div class="space-y-4">
<!-- Command Item 1 -->
<div class="flex justify-between items-center">
<p class="text-gray-200 dark:text-gray-200 text-base font-normal leading-normal">Éteins la lumière du salon</p>
<p class="text-gray-400 dark:text-gray-500 text-sm font-normal leading-normal">10:32 AM</p>
</div>
<!-- Command Item 2 -->
<div class="flex justify-between items-center">
<p class="text-gray-200 dark:text-gray-200 text-base font-normal leading-normal">Mets la climatisation à 22 degrés</p>
<p class="text-gray-400 dark:text-gray-500 text-sm font-normal leading-normal">10:31 AM</p>
</div>
<!-- Command Item 3 -->
<div class="flex justify-between items-center">
<p class="text-gray-200 dark:text-gray-200 text-base font-normal leading-normal">Joue la playlist 'Afrobeat Chill'</p>
<p class="text-gray-400 dark:text-gray-500 text-sm font-normal leading-normal">10:29 AM</p>
</div>
<!-- Command Item 4 -->
<div class="flex justify-between items-center">
<p class="text-gray-200 dark:text-gray-200 text-base font-normal leading-normal">Ouvre les rideaux de la chambre</p>
<p class="text-gray-400 dark:text-gray-500 text-sm font-normal leading-normal">10:28 AM</p>
</div>
<!-- Command Item 5 -->
<div class="flex justify-between items-center">
<p class="text-gray-200 dark:text-gray-200 text-base font-normal leading-normal">Quel temps fait-il dehors ?</p>
<p class="text-gray-400 dark:text-gray-500 text-sm font-normal leading-normal">10:25 AM</p>
</div>
</div>
</div>
</div>
</div>
</body></html>
